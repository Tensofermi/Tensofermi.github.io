<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏 - Little Fluctuating Cat _(:з」∠)_~</title>
    <link rel="shortcut icon" href="../../images/main.png">
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        #gameCanvas {
            border: 2px solid #000;
            display: block;
            margin: 0 auto;
        }
        .game-controls {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header class="header-bg">
        <script>
            var page_index = 2;
        </script>
        <script defer src="../../js/script.js"></script>
        <button class="btn-left" id="prev-btn" aria-label="Previous image">&#10094;</button>
        <button class="btn-right" id="next-btn" aria-label="Next image">&#10095;</button>
    </header>

    <nav class="navbar">
        <ul>
            <li class="logo"><img src="../../images/main_full.jpg" alt="Logo" /><span>Tensofermi</span></li>
            <ul class="nav-links">
                <li><a class="nav_item" href="../../index.html">Home</a></li>
                <li><a class="nav_item" href="../../notes.html">Notes</a></li>
                <li><a class="nav_item" href="../../featured.html">Featured</a></li>
                <li><a class="nav_item" href="../../contact.html">Contact</a></li>
            </ul>
        </ul>
    </nav>

    <section>
        <h2>贪吃蛇小游戏</h2>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-controls">
            <button id="startBtn">开始游戏</button>
            <button id="pauseBtn">暂停</button>
            <select id="boundaryType">
                <option value="free">自由边界</option>
                <option value="periodic">周期性边界</option>
                <option value="antiperiodic">反周期性边界</option>
            </select>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Little Fluctuating Cat _(:з」∠)_~. All rights reserved.</p>
    </footer>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const boundaryType = document.getElementById('boundaryType');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let isPaused = false;

        function drawGame() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'green';
            snake.forEach(segment => {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });

            ctx.fillStyle = 'red';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText(`得分: ${score}`, 10, 30);
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function checkCollision() {
            const head = snake[0];
            const boundary = boundaryType.value;

            if (boundary === 'free') {
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                    return true;
                }
            } else if (boundary === 'periodic') {
                if (head.x < 0) head.x = tileCount - 1;
                if (head.x >= tileCount) head.x = 0;
                if (head.y < 0) head.y = tileCount - 1;
                if (head.y >= tileCount) head.y = 0;
            } else if (boundary === 'antiperiodic') {
                if (head.x < 0) {
                    head.x = tileCount - 1;
                    head.y = tileCount - 1 - head.y;
                }
                if (head.x >= tileCount) {
                    head.x = 0;
                    head.y = tileCount - 1 - head.y;
                }
                if (head.y < 0) {
                    head.y = tileCount - 1;
                    head.x = tileCount - 1 - head.x;
                }
                if (head.y >= tileCount) {
                    head.y = 0;
                    head.x = tileCount - 1 - head.x;
                }
            }

            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function gameLoop() {
            if (isPaused) return;
            moveSnake();
            if (checkCollision()) {
                clearInterval(gameInterval);
                alert(`游戏结束！得分：${score}`);
                return;
            }
            drawGame();
        }

        startBtn.addEventListener('click', () => {
            if (gameInterval) clearInterval(gameInterval);
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            generateFood();
            gameInterval = setInterval(gameLoop, 100);
        });

        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
        });

        document.addEventListener('keydown', (event) => {
            switch (event.key.toLowerCase()) {
                case 'w':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 's':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'a':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'd':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });
    </script>
</body>
</html>
