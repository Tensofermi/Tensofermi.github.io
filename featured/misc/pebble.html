<body class="site-page feature-demo-page">
  <header class="hero header-bg"><script>var page_index = 2;</script><script defer src="../../js/script.js"></script><button class="carousel-button btn-left" id="prev-btn" aria-label="Previous image">&#10094;</button><button class="carousel-button btn-right" id="next-btn" aria-label="Next image">&#10095;</button></header>

  <main class="page-content"><section class="content-panel"><h2>Rigidity Pebble Game Demo</h2><div class="demo-toolbar"><button onclick="addEdge()">Add Edge</button><button onclick="reset()">Reset</button></div><canvas id="canvas" width="700" height="450"></canvas><div id="status"></div></section></main>
  <footer class="site-footer"><p>&copy; 2024 Little Fluctuating Cat _(:&#1079;&#12293;&#8736;)_~. All rights reserved.</p></footer>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let nodes = [
  { x: 150, y: 120, pebbles: 2 },
  { x: 400, y: 120, pebbles: 2 },
  { x: 500, y: 300, pebbles: 2 },
  { x: 200, y: 300, pebbles: 2 }
];
let edges = [];

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const edge of edges) {
    ctx.strokeStyle = edge.redundant ? "#d6497a" : "#12315c";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(nodes[edge.a].x, nodes[edge.a].y);
    ctx.lineTo(nodes[edge.b].x, nodes[edge.b].y);
    ctx.stroke();
  }
  ctx.font = '14px Segoe UI';
  for (let i = 0; i < nodes.length; i += 1) {
    const node = nodes[i];
    ctx.beginPath();
    ctx.arc(node.x, node.y, 20, 0, 2 * Math.PI);
    ctx.fillStyle = "#e8eef6";
    ctx.fill();
    ctx.strokeStyle = '#12315c';
    ctx.stroke();
    ctx.fillStyle = "#172033";
    ctx.fillText(`N${i}`, node.x - 10, node.y - 28);
    for (let p = 0; p < node.pebbles; p += 1) {
      ctx.beginPath();
      ctx.arc(node.x - 10 + p * 10, node.y + 5, 4, 0, 2 * Math.PI);
      ctx.fillStyle = "#3f7edb";
      ctx.fill();
    }
  }
  updateStatus();
}

function addEdge() {
  let a = Math.floor(Math.random() * nodes.length);
  let b = Math.floor(Math.random() * nodes.length);
  if (a === b) return;
  for (const edge of edges) {
    if ((edge.a === a && edge.b === b) || (edge.a === b && edge.b === a)) return;
  }
  let redundant = false;
  if (nodes[a].pebbles > 0) {
    nodes[a].pebbles -= 1;
  } else if (nodes[b].pebbles > 0) {
    nodes[b].pebbles -= 1;
  } else {
    redundant = true;
  }
  edges.push({ a, b, redundant });
  draw();
}

function updateStatus() {
  const N = nodes.length;
  const edgeCount = edges.length;
  const maxEdges = 2 * N - 3;
  const rigid = edgeCount >= maxEdges;
  document.getElementById("status").textContent = `Edges m = ${edgeCount} | Maxwell limit 2N - 3 = ${maxEdges} | Structure: ${rigid ? 'RIGID' : 'FLOPPY'}`;
}

function reset() {
  edges = [];
  for (const node of nodes) node.pebbles = 2;
  draw();
}

draw();
</script>
</body>
