  <style>
    .feature-demo-page .page-content { max-width: 1080px; }
    .color-shell {
      position: relative;
      overflow: hidden;
      padding: clamp(26px, 4vw, 38px);
      background:
        radial-gradient(circle at top right, rgba(88, 126, 196, 0.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(204, 119, 132, 0.14), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(247, 250, 253, 0.92));
    }
    .color-shell::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 22px;
      border: 1px solid rgba(15, 23, 42, 0.05);
      pointer-events: none;
    }
    .color-header {
      position: relative;
      z-index: 1;
      margin-bottom: 24px;
      text-align: left;
    }
    .color-header p {
      max-width: 580px;
      color: #566274;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      line-height: 1.72;
    }
    .color-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 24px;
      align-items: stretch;
    }
    .color-preview {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .color-display {
      position: relative;
      width: 100%;
      min-height: 360px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),

    }
    .display-chip {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      display: flex;

    }

      line-height: 1.5;

    }
    .color-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;

    .meta-card {

      border-radius: 16px;

    .slider-container {

      font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;

    }
    .slider-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;

    .slider-label-green { background: linear-gradient(180deg, #2d9d73, #1f7556); }

      text-align: right;

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: #184985;
    }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .action-btn {
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid rgba(18, 69, 127, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      color: #172033;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background-color 0.22s ease;
    }
    .action-btn:hover {
      transform: translateY(-1px);
      background: #f7faff;
      box-shadow: 0 12px 22px rgba(17, 56, 100, 0.1);
    }
    .action-btn.primary {
      background: linear-gradient(180deg, #184985, #113864);
      color: #f8fbff;

    }
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .palette-swatch {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(18, 69, 127, 0.08);
      border-radius: 16px;
      background: rgba(255,255,255,0.84);
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }
    .palette-swatch:hover {
      transform: translateY(-2px);
      border-color: rgba(18, 69, 127, 0.18);
      box-shadow: 0 12px 24px rgba(17, 56, 100, 0.08);
    }
    .palette-swatch span {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.06);
    }
    .palette-swatch strong {
      color: #475467;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
    }
    .feedback {
      min-height: 1.2em;
      margin-top: 8px;
      color: #55708f;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      font-size: 0.88rem;
    }
    @media (max-width: 860px) {
      .color-grid {
        grid-template-columns: 1fr;
      }
      .color-display {
        min-height: 300px;
      }
      .color-meta {
        grid-template-columns: 1fr;
      }
      .palette-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

  <main class="page-content">

        <p>拖动三个通道，直接观察颜色、亮度与冷暖倾向的变化。这一页不只是取值器，而是一个适合快速试色的小型配色工作台。</p>

              </button>

              </button>

<script>
const rSlider = document.getElementById('rSlider');
const gSlider = document.getElementById('gSlider');
const bSlider = document.getElementById('bSlider');
const rValue = document.getElementById('rValue');
const gValue = document.getElementById('gValue');
const bValue = document.getElementById('bValue');
const colorDisplay = document.getElementById('colorDisplay');
const hexCode = document.getElementById('hexCode');
const rgbCode = document.getElementById('rgbCode');
const hslCode = document.getElementById('hslCode');
const luminanceValue = document.getElementById('luminanceValue');
const moodLine = document.getElementById('moodLine');
const randomBtn = document.getElementById('randomBtn');
const copyBtn = document.getElementById('copyBtn');
const resetBtn = document.getElementById('resetBtn');
const feedback = document.getElementById('feedback');
const paletteButtons = document.querySelectorAll('.palette-swatch');

function componentToHex(value) {
  return value.toString(16).padStart(2, '0').toUpperCase();
}

function rgbToHsl(r, g, b) {
  const red = r / 255;
  const green = g / 255;
  const blue = b / 255;
  const max = Math.max(red, green, blue);
  const min = Math.min(red, green, blue);
  const delta = max - min;
  let hue = 0;
  let saturation = 0;
  const lightness = (max + min) / 2;

  if (delta !== 0) {
    saturation = delta / (1 - Math.abs(2 * lightness - 1));
    switch (max) {
      case red:
        hue = ((green - blue) / delta) % 6;
        break;
      case green:
        hue = (blue - red) / delta + 2;
        break;
      default:
        hue = (red - green) / delta + 4;
        break;
    }
    hue = Math.round(hue * 60);
    if (hue < 0) {
      hue += 360;
    }
  }

  return {
    h: hue,
    s: Math.round(saturation * 100),
    l: Math.round(lightness * 100)
  };
}

function relativeLuminance(r, g, b) {
  const transform = (channel) => {
    const value = channel / 255;
    return value <= 0.03928 ? value / 12.92 : ((value + 0.055) / 1.055) ** 2.4;
  };

  return 0.2126 * transform(r) + 0.7152 * transform(g) + 0.0722 * transform(b);
}

function describeColor(r, g, b, hsl, luminance) {
  if (luminance < 0.06) {
    return '接近纯黑，安静、克制、密度很高。';
  }
  if (luminance > 0.82 && hsl.s < 12) {
    return '像纸面一样偏亮，平静、轻盈、几乎中性。';
  }
  if (hsl.s < 10) {
    return '饱和度很低，偏中性，理性而克制。';
  }
  if (hsl.h < 20 || hsl.h >= 345) {
    return '偏暖红，相当直接，带一点张力和速度感。';
  }
  if (hsl.h < 55) {
    return '落在琥珀区间，明亮，略带金属感。';
  }
  if (hsl.h < 90) {
    return '偏黄绿，锐利，轻快，能量感比较强。';
  }
  if (hsl.h < 165) {
    return '青绿之间的平衡区，清新且稳定。';
  }
  if (hsl.h < 220) {
    return '冷蓝色调，干净、克制、控制感强。';
  }
  if (hsl.h < 290) {
    return '蓝紫过渡，偏理性，也带一点人工感。';
  }
  return '洋红到紫色之间，戏剧性更强，但仍然偏冷。';
}

function setRgb(r, g, b) {
  rSlider.value = r;
  gSlider.value = g;
  bSlider.value = b;
  updateColor();
}

function hexToRgb(hex) {
  const value = hex.replace('#', '');
  return {
    r: parseInt(value.slice(0, 2), 16),
    g: parseInt(value.slice(2, 4), 16),
    b: parseInt(value.slice(4, 6), 16)
  };
}

function updateColor() {
  const r = parseInt(rSlider.value, 10);
  const g = parseInt(gSlider.value, 10);
  const b = parseInt(bSlider.value, 10);
  const hex = `#${componentToHex(r)}${componentToHex(g)}${componentToHex(b)}`;
  const hsl = rgbToHsl(r, g, b);
  const luminance = relativeLuminance(r, g, b);

  rValue.textContent = r;
  gValue.textContent = g;
  bValue.textContent = b;
  colorDisplay.style.background = `rgb(${r}, ${g}, ${b})`;
  hexCode.textContent = hex;
  rgbCode.textContent = `rgb(${r}, ${g}, ${b})`;
  hslCode.textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
  luminanceValue.textContent = luminance.toFixed(3);
  moodLine.textContent = describeColor(r, g, b, hsl, luminance);
}

rSlider.addEventListener('input', updateColor);
gSlider.addEventListener('input', updateColor);
bSlider.addEventListener('input', updateColor);

randomBtn.addEventListener('click', () => {
  setRgb(
    Math.floor(Math.random() * 256),
    Math.floor(Math.random() * 256),
    Math.floor(Math.random() * 256)
  );
  feedback.textContent = '已生成一组新的随机颜色。';
});

resetBtn.addEventListener('click', () => {
  setRgb(0, 0, 0);
  feedback.textContent = '已重置为纯黑。';
});

copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(hexCode.textContent);
    feedback.textContent = `已复制 ${hexCode.textContent}。`;
  } catch (error) {
    feedback.textContent = '当前环境无法访问剪贴板。';
  }
});

paletteButtons.forEach((button) => {
  button.addEventListener('click', () => {
    const { r, g, b } = hexToRgb(button.dataset.color);
    setRgb(r, g, b);
    feedback.textContent = `已载入「${button.textContent.trim()}」。`;
  });
});

updateColor();
</script>
