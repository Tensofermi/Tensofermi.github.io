<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGB 调色器</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #1e1e2f;
        color: #fff;
    }

    .container {
        background: #2c2c3e;
        padding: 30px 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        text-align: center;
        max-width: 400px;
        width: 100%;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 24px;
        font-weight: 600;
    }

    .color-display {
        width: 100%;
        height: 150px;
        border-radius: 15px;
        margin: 20px 0;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
        transition: background 0.2s;
    }

    .hex-code {
        font-size: 20px;
        font-weight: 500;
        margin-bottom: 20px;
    }

    .slider-container {
        display: flex;
        align-items: center;
        margin: 15px 0;
    }

    .slider-label {
        width: 40px;
        text-align: left;
        font-weight: 500;
    }

    input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 10px;
        border-radius: 5px;
        background: #555;
        outline: none;
        margin-left: 10px;
        margin-right: 10px;
        transition: 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        transition: 0.2s;
    }

    input[type="range"]::-moz-range-thumb {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        transition: 0.2s;
    }

    input[type="range"]::-webkit-slider-runnable-track {
        height: 10px;
        border-radius: 5px;
        background: linear-gradient(to right, red, green, blue);
    }
</style>
</head>
<body>
<div class="container">
    <h1>RGB 调色器</h1>
    <div class="hex-code" id="hexCode">#000000</div>
    <div class="color-display" id="colorDisplay"></div>

    <div class="slider-container">
        <span class="slider-label">R</span>
        <input type="range" min="0" max="255" value="0" id="rSlider">
    </div>
    <div class="slider-container">
        <span class="slider-label">G</span>
        <input type="range" min="0" max="255" value="0" id="gSlider">
    </div>
    <div class="slider-container">
        <span class="slider-label">B</span>
        <input type="range" min="0" max="255" value="0" id="bSlider">
    </div>
</div>

<script>
    const rSlider = document.getElementById('rSlider');
    const gSlider = document.getElementById('gSlider');
    const bSlider = document.getElementById('bSlider');
    const colorDisplay = document.getElementById('colorDisplay');
    const hexCode = document.getElementById('hexCode');

    function updateColor() {
        const r = parseInt(rSlider.value);
        const g = parseInt(gSlider.value);
        const b = parseInt(bSlider.value);

        const hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b)
                        .toString(16)
                        .slice(1)
                        .toUpperCase();

        colorDisplay.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        hexCode.textContent = hex;
    }

    rSlider.addEventListener('input', updateColor);
    gSlider.addEventListener('input', updateColor);
    bSlider.addEventListener('input', updateColor);

    // 初始化颜色
    updateColor();
</script>
</body>
</html>
